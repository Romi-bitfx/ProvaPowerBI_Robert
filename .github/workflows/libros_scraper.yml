name: Scraping Manual de Libros

on:
  workflow_dispatch: # 👈 Único disparador activo. Solo se ejecuta haciendo clic en el botón.

jobs:
  scraper-job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando el código del repositorio
      uses: actions/checkout@v4

    - name: 2. Configurando Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalando librerías (Requests y BeautifulSoup4)
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. Ejecutando Scraper de Apple
      run: python scraper_libros.py

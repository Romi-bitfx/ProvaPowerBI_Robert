name: Scraping Manual con Guardado en Repo de Libros

on:
  workflow_dispatch: # Solo se ejecuta al pulsar el botón en GitHub

# ⚠️ MUY IMPORTANTE: Da permisos al script para modificar y subir archivos al repositorio
permissions:
  contents: write

jobs:
  scraper-job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando el código del repositorio
      uses: actions/checkout@v4

    - name: 2. Configurando Python en el servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalando librerías (Requests y BeautifulSoup4)
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. Ejecutando Scraper de Libros
      run: python scraper_libros.py

    - name: 5. Guardar y subir cambios al repositorio
      run: |
        # Configurar un usuario bot de Git para que firme el commit
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Añadir el archivo generado al área de preparación (stage)
        git add libros.txt
        
        # Hacer el commit. Si no hay cambios (porque los precios no variaron), evitamos que falle con un "|| echo"
        git commit -m "🤖 Actualización automática: libros.txt [skip ci]" || echo "No hay cambios detectados en el archivo."
        
        # Subir los cambios a la rama activa del repositorio
        git push

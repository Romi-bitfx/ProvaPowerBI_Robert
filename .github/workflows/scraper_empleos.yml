name: Scraping Manual de Empleos (CSV)

on:
  workflow_dispatch: # Se ejecuta solo al darle al botón en GitHub

permissions:
  contents: write # Permiso obligatorio para subir archivos al repositorio

jobs:
  scraper-job:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargando el código
      uses: actions/checkout@v4

    - name: 2. Configurando Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Instalando librerías
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 4. Ejecutando Scraper de Empleos
      run: python scraper_empleos.py

    - name: 5. Guardar y subir el CSV al repositorio
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Añadimos el archivo CSV que creará nuestro script
        git add ofertas_empleo.csv
        
        # Hacemos commit evitando fallos si el archivo no ha cambiado
        git commit -m "📊 Datos actualizados: ofertas_empleo.csv [skip ci]" || echo "No hay cambios en los datos."
        
        # Subimos los cambios
        git push